services:
  - type: web
    name: mlm-app
    env: node
    region: oregon
    plan: free
    buildCommand: NODE_ENV=production pnpm install --prod=false && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 3000
