services:
  - type: web
    name: mlm-app
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        scope: build,run
      - key: PORT
        value: 3000
